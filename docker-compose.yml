version: '3.8'

services:
  # Main Flask application + honeypots
  app:
    build: .
    container_name: honeypot-app
    ports:
      - "5000:5000"   # Web dashboard
      - "2222:2222"   # SSH honeypot
      - "8080:8080"   # HTTP honeypot
      - "2121:2121"   # FTP honeypot
    environment:
      - FLASK_CONFIG=docker
      - DATABASE_URL=postgresql://honeypot:honeypot@postgres:5432/honeypot
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SECRET_KEY=${SECRET_KEY:-super-secret-change-me}
      - AI_ENABLED=true
      - GEOIP_ENABLED=true
      - THREAT_INTEL_ENABLED=true
      - ALERTING_ENABLED=true
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY:-}
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - honeypot-net

  # Celery worker for async processing
  celery-worker:
    build: .
    container_name: honeypot-celery
    command: celery -A app.tasks.celery_app:celery_app worker --loglevel=info --concurrency=4
    environment:
      - FLASK_CONFIG=docker
      - DATABASE_URL=postgresql://honeypot:honeypot@postgres:5432/honeypot
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - AI_ENABLED=true
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY:-}
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY:-}
    depends_on:
      - app
      - redis
      - postgres
    restart: unless-stopped
    networks:
      - honeypot-net

  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: honeypot-postgres
    environment:
      - POSTGRES_DB=honeypot
      - POSTGRES_USER=honeypot
      - POSTGRES_PASSWORD=honeypot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honeypot"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - honeypot-net

  # Redis for caching and Celery broker
  redis:
    image: redis:7-alpine
    container_name: honeypot-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - honeypot-net

  # Nginx reverse proxy (optional, for production)
  nginx:
    image: nginx:alpine
    container_name: honeypot-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - honeypot-net

volumes:
  postgres_data:

networks:
  honeypot-net:
    driver: bridge
